<meta charset="UTF-8">
<script>

let idade = parseInt(prompt("Digite sua idade: "))
let tempo = parseFloat(prompt("Por quanto tempo você contribuiu com a empresa? "))

if( idade >=65 || (tempo >=30 && idade >=60)){

    document.write("Você já pode se aposentar!")
}
else{
    document.write("Você ainda não pode se aposentar!")
}
</script>
